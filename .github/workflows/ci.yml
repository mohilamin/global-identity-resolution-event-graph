name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m src.data_generation.generate_profiles
      - run: python -m src.data_generation.generate_events
      - run: python -m src.data_generation.generate_ground_truth
      - run: python -m src.pipeline.run_all
      - run: python -m pytest
      - run: python -m ruff check .

